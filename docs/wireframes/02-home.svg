<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="home-title home-desc">
  <title id="home-title">Excelerate Connect low-fidelity home wireframe</title>
  <desc id="home-desc">A grayscale mobile home dashboard with a greeting, notification placeholder, search, featured programs, upcoming events, a recent announcement, and four-item bottom navigation.</desc>
  <style>
    .screen { fill: #fafafa; stroke: #333333; stroke-width: 2; }
    .box { fill: #f2f2f2; stroke: #555555; stroke-width: 1.4; }
    .card { fill: #ffffff; stroke: #555555; stroke-width: 1.4; }
    .dark { fill: #3a3a3a; stroke: #222222; stroke-width: 1.4; }
    .ink { fill: #222222; font-family: Arial, Helvetica, sans-serif; }
    .muted { fill: #666666; font-family: Arial, Helvetica, sans-serif; }
    .light { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; }
    .line { fill: none; stroke: #666666; stroke-width: 1.5; }
  </style>

  <rect class="screen" x="1" y="1" width="388" height="842" rx="22" />

  <!-- Greeting and notifications -->
  <text class="muted" x="22" y="39" font-size="11" letter-spacing="1.3">HOME DASHBOARD</text>
  <text class="ink" x="22" y="67" font-size="21" font-weight="700">Hello, Learner</text>
  <text class="muted" x="22" y="87" font-size="12">Discover what is planned for you</text>
  <rect class="box" x="334" y="39" width="36" height="36" rx="8" />
  <path class="line" d="M344 62 h16 l-3-4 v-6 a5 5 0 0 0-10 0 v6 z" />
  <circle cx="352" cy="65" r="1.8" fill="#666666" />
  <circle cx="364" cy="44" r="4" fill="#555555" />

  <!-- Search -->
  <rect class="box" x="20" y="105" width="350" height="43" rx="7" />
  <circle cx="38" cy="126" r="7" fill="none" stroke="#777777" stroke-width="1.5" />
  <line x1="43" y1="131" x2="48" y2="136" stroke="#777777" stroke-width="1.5" />
  <text class="muted" x="58" y="131" font-size="12">Search planned programs and events</text>

  <!-- Featured programs -->
  <text class="ink" x="20" y="179" font-size="15" font-weight="700">Featured Programs</text>
  <text class="muted" x="370" y="179" font-size="11" text-anchor="end">View all</text>
  <rect class="card" x="20" y="192" width="169" height="139" rx="7" />
  <rect class="box" x="30" y="202" width="149" height="65" rx="4" />
  <line x1="30" y1="202" x2="179" y2="267" stroke="#b0b0b0" />
  <line x1="179" y1="202" x2="30" y2="267" stroke="#b0b0b0" />
  <text class="muted" x="104.5" y="238" font-size="10" text-anchor="middle">IMAGE</text>
  <text class="ink" x="30" y="289" font-size="12" font-weight="700">Program Title A</text>
  <text class="muted" x="30" y="307" font-size="10">Category • Deadline</text>
  <text class="muted" x="169" y="320" font-size="10" text-anchor="end">Details →</text>

  <rect class="card" x="201" y="192" width="169" height="139" rx="7" />
  <rect class="box" x="211" y="202" width="149" height="65" rx="4" />
  <line x1="211" y1="202" x2="360" y2="267" stroke="#b0b0b0" />
  <line x1="360" y1="202" x2="211" y2="267" stroke="#b0b0b0" />
  <text class="muted" x="285.5" y="238" font-size="10" text-anchor="middle">IMAGE</text>
  <text class="ink" x="211" y="289" font-size="12" font-weight="700">Program Title B</text>
  <text class="muted" x="211" y="307" font-size="10">Category • Deadline</text>
  <text class="muted" x="350" y="320" font-size="10" text-anchor="end">Details →</text>

  <!-- Upcoming events -->
  <text class="ink" x="20" y="364" font-size="15" font-weight="700">Upcoming Events</text>
  <rect class="card" x="20" y="377" width="350" height="66" rx="7" />
  <rect class="dark" x="30" y="387" width="48" height="46" rx="5" />
  <text class="light" x="54" y="405" font-size="10" text-anchor="middle">DAY</text>
  <text class="light" x="54" y="423" font-size="16" font-weight="700" text-anchor="middle">12</text>
  <text class="ink" x="92" y="402" font-size="12" font-weight="700">Virtual Learning Session</text>
  <text class="muted" x="92" y="422" font-size="10">10:00 AM • Online</text>
  <text class="muted" x="353" y="414" font-size="16" text-anchor="end">›</text>

  <rect class="card" x="20" y="453" width="350" height="66" rx="7" />
  <rect class="box" x="30" y="463" width="48" height="46" rx="5" />
  <text class="muted" x="54" y="481" font-size="10" text-anchor="middle">DAY</text>
  <text class="ink" x="54" y="499" font-size="16" font-weight="700" text-anchor="middle">18</text>
  <text class="ink" x="92" y="478" font-size="12" font-weight="700">Community Event</text>
  <text class="muted" x="92" y="498" font-size="10">2:00 PM • Event details</text>
  <text class="muted" x="353" y="490" font-size="16" text-anchor="end">›</text>

  <!-- Announcement -->
  <text class="ink" x="20" y="552" font-size="15" font-weight="700">Recent Announcement</text>
  <rect class="card" x="20" y="565" width="350" height="116" rx="7" />
  <rect class="box" x="31" y="577" width="42" height="42" rx="21" />
  <text class="muted" x="52" y="602" font-size="16" text-anchor="middle">!</text>
  <text class="ink" x="86" y="588" font-size="12" font-weight="700">Announcement title placeholder</text>
  <text class="muted" x="86" y="607" font-size="10">Posted recently</text>
  <line x1="31" y1="629" x2="359" y2="629" stroke="#d0d0d0" />
  <text class="muted" x="31" y="650" font-size="10">Short announcement summary appears here for learners.</text>
  <text class="muted" x="359" y="669" font-size="10" text-anchor="end">Read more →</text>

  <text class="muted" x="195" y="720" font-size="10" text-anchor="middle">Planning concept • Content is placeholder only</text>

  <!-- Bottom navigation -->
  <rect class="card" x="1" y="748" width="388" height="95" rx="0" />
  <rect class="box" x="25" y="761" width="42" height="32" rx="6" />
  <path d="M37 779 l9-8 9 8 v8 h-18 z" fill="none" stroke="#333333" stroke-width="1.5" />
  <text class="ink" x="46" y="814" font-size="10" font-weight="700" text-anchor="middle">Home</text>

  <rect class="box" x="116" y="761" width="42" height="32" rx="6" />
  <rect x="127" y="770" width="20" height="14" fill="none" stroke="#666666" stroke-width="1.5" />
  <line x1="127" y1="775" x2="147" y2="775" stroke="#666666" />
  <text class="muted" x="137" y="814" font-size="10" text-anchor="middle">Programs</text>

  <rect class="box" x="232" y="761" width="42" height="32" rx="6" />
  <line x1="244" y1="785" x2="244" y2="778" stroke="#666666" stroke-width="3" />
  <line x1="253" y1="785" x2="253" y2="773" stroke="#666666" stroke-width="3" />
  <line x1="262" y1="785" x2="262" y2="768" stroke="#666666" stroke-width="3" />
  <text class="muted" x="253" y="814" font-size="10" text-anchor="middle">Progress</text>

  <rect class="box" x="323" y="761" width="42" height="32" rx="6" />
  <circle cx="344" cy="773" r="5" fill="none" stroke="#666666" stroke-width="1.5" />
  <path d="M334 786 q10-10 20 0" fill="none" stroke="#666666" stroke-width="1.5" />
  <text class="muted" x="344" y="814" font-size="10" text-anchor="middle">Profile</text>
</svg>
