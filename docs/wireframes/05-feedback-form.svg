<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="feedback-title feedback-desc">
  <title id="feedback-title">Excelerate Connect low-fidelity feedback form wireframe</title>
  <desc id="feedback-desc">A grayscale mobile wireframe with a back button, selected program name, five-point rating control, feedback text area, optional suggestion field, and submit feedback button.</desc>
  <rect width="390" height="844" fill="#fafafa"/>
  <rect x="0.5" y="0.5" width="389" height="843" rx="22" fill="none" stroke="#333"/>

  <g font-family="Arial, Helvetica, sans-serif" fill="#222">
    <!-- Simple status area -->
    <text x="22" y="22" font-size="11">9:41</text>
    <rect x="330" y="13" width="14" height="7" rx="1" fill="none" stroke="#555"/>
    <rect x="349" y="13" width="14" height="7" rx="1" fill="none" stroke="#555"/>

    <!-- Page header -->
    <rect x="0" y="32" width="390" height="58" fill="#f2f2f2" stroke="#555"/>
    <rect x="18" y="47" width="34" height="30" rx="3" fill="#fff" stroke="#444"/>
    <path d="M41 62H28 M28 62L34 56 M28 62L34 68" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="68" y="67" font-size="20" font-weight="700">Give Feedback</text>

    <!-- Program context -->
    <text x="24" y="122" font-size="12" font-weight="700">PROGRAM NAME</text>
    <rect x="24" y="134" width="342" height="56" rx="4" fill="#f2f2f2" stroke="#555"/>
    <rect x="36" y="146" width="34" height="32" fill="#ddd" stroke="#777"/>
    <path d="M40 173L49 164L56 170L64 159L67 173Z" fill="none" stroke="#777"/>
    <text x="84" y="158" font-size="11" fill="#666">Selected program</text>
    <text x="84" y="176" font-size="14">[Program Name]</text>

    <!-- Rating control -->
    <text x="24" y="225" font-size="14" font-weight="700">Your Rating</text>
    <text x="24" y="244" font-size="11" fill="#666">Select one rating</text>
    <g text-anchor="middle">
      <rect x="24" y="258" width="54" height="54" rx="4" fill="#f2f2f2" stroke="#555"/>
      <text x="51" y="282" font-size="16">☆</text>
      <text x="51" y="301" font-size="10">1</text>
      <rect x="96" y="258" width="54" height="54" rx="4" fill="#f2f2f2" stroke="#555"/>
      <text x="123" y="282" font-size="16">☆</text>
      <text x="123" y="301" font-size="10">2</text>
      <rect x="168" y="258" width="54" height="54" rx="4" fill="#f2f2f2" stroke="#555"/>
      <text x="195" y="282" font-size="16">☆</text>
      <text x="195" y="301" font-size="10">3</text>
      <rect x="240" y="258" width="54" height="54" rx="4" fill="#f2f2f2" stroke="#555"/>
      <text x="267" y="282" font-size="16">☆</text>
      <text x="267" y="301" font-size="10">4</text>
      <rect x="312" y="258" width="54" height="54" rx="4" fill="#f2f2f2" stroke="#555"/>
      <text x="339" y="282" font-size="16">☆</text>
      <text x="339" y="301" font-size="10">5</text>
    </g>

    <!-- Feedback entry -->
    <text x="24" y="350" font-size="14" font-weight="700">Feedback</text>
    <rect x="24" y="362" width="342" height="142" rx="4" fill="#fff" stroke="#555"/>
    <text x="38" y="387" font-size="12" fill="#777">Share your experience...</text>
    <line x1="38" y1="410" x2="350" y2="410" stroke="#ddd"/>
    <line x1="38" y1="434" x2="350" y2="434" stroke="#ddd"/>
    <line x1="38" y1="458" x2="350" y2="458" stroke="#ddd"/>
    <path d="M350 490L358 482 M354 494L362 486" stroke="#999"/>

    <!-- Optional suggestion -->
    <text x="24" y="540" font-size="14" font-weight="700">Suggestion <tspan font-weight="400" fill="#666">(optional)</tspan></text>
    <rect x="24" y="552" width="342" height="80" rx="4" fill="#fff" stroke="#555"/>
    <text x="38" y="578" font-size="12" fill="#777">Add an improvement suggestion...</text>

    <!-- Primary action -->
    <rect x="24" y="670" width="342" height="52" rx="4" fill="#dedede" stroke="#333" stroke-width="1.5"/>
    <text x="195" y="702" font-size="15" font-weight="700" text-anchor="middle">Submit Feedback</text>

    <text x="195" y="804" font-size="10" text-anchor="middle" fill="#777">LOW-FIDELITY PLANNING WIREFRAME</text>
  </g>
</svg>
